# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres?currentSchema=emerald_grove
spring.datasource.username=postgres
spring.datasource.password=1
spring.datasource.driver-class-name=org.postgresql.Driver
spring.flyway.repair-on-migrate=true

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=emerald_grove
spring.flyway.enabled=true
spring.flyway.schemas=emerald_grove
spring.flyway.default-schema=emerald_grove
spring.flyway.baseline-on-migrate=true

server.port=8080

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Security
emerald-grove.security.allowed-origin-patterns=chrome-extension://*,moz-extension://*

# JWT: secret key for signing access tokens.
# Must be at least 32 characters. Override via JWT_SECRET environment variable in production.
emerald-grove.security.jwt-secret=${JWT_SECRET:emerald-grove-diploma-dev-secret-key-32chars}

# Access token valid for 15 minutes (900000 ms)
emerald-grove.security.access-token-expiration-ms=900000

# Refresh token valid for 7 days
emerald-grove.security.refresh-token-expiration-days=7

# Optional Groq summary generation for article descriptions.
# Keep disabled until GROQ_API_KEY is configured in the environment.
emerald-grove.ai.groq.enabled=true
emerald-grove.ai.groq.api-url=https://api.groq.com/openai/v1/chat/completions
emerald-grove.ai.groq.api-key=${GROQ_API_KEY:}
emerald-grove.ai.groq.model=qwen/qwen3-32b
emerald-grove.ai.groq.summary-max-chars=280
emerald-grove.ai.groq.request-timeout-ms=15000

# Rate limiting (fixed window per IP)
emerald-grove.rate-limit.sync-limit=30
emerald-grove.rate-limit.auth-limit=10
emerald-grove.rate-limit.window-seconds=60
