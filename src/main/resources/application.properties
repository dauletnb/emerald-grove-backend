# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres?currentSchema=emerald_grove
spring.datasource.username=postgres
spring.datasource.password=1
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=emerald_grove
spring.flyway.enabled=true
spring.flyway.schemas=emerald_grove
spring.flyway.default-schema=emerald_grove
spring.flyway.baseline-on-migrate=true

#spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

server.port=8080

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

emerald-grove.security.extension-token=change-me-extension-token
emerald-grove.security.allowed-origin-patterns=chrome-extension://*,moz-extension://*

# Optional Groq summary generation for article descriptions.
# Keep disabled until GROQ_API_KEY is configured in the environment.
emerald-grove.ai.groq.enabled=true
emerald-grove.ai.groq.api-url=https://api.groq.com/openai/v1/chat/completions
emerald-grove.ai.groq.api-key=${GROQ_API_KEY:}
emerald-grove.ai.groq.model=qwen/qwen3-32b
emerald-grove.ai.groq.summary-max-chars=280
emerald-grove.ai.groq.request-timeout-ms=15000

