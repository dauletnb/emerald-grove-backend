# Test configuration for Spring Security tests

# H2 in-memory database for testing
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Disable schema for H2 database
spring.jpa.properties.hibernate.default_schema=
spring.jpa.properties.hibernate.globally_quoted_identifiers=false

# Disable Swagger in tests
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Test server port
server.port=0

# Logging configuration for security tests
logging.level.com.emeraldgrove.security=DEBUG
logging.level.org.springframework.security=DEBUG

emerald-grove.security.extension-token=integration-test-extension-token
emerald-grove.security.allowed-origin-patterns=chrome-extension://valid-extension-id-123,moz-extension://valid-extension-id-123

# High rate limits in tests to avoid interfering with acceptance tests
emerald-grove.rate-limit.sync-limit=100
emerald-grove.rate-limit.auth-check-limit=100
emerald-grove.rate-limit.window-seconds=60
